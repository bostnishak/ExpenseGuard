name: expenseguard_mobile
description: "ExpenseGuard Pro - Kurumsal Gider Yönetimi Mobil Uygulaması"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP İstekleri (API Bağlantısı)
  http: ^1.2.0
  
  # Local Storage (JWT Token saklamak için)
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Kamera & Galeri
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  
  # UI Özelleştirmeleri
  google_fonts: ^6.1.0
  intl: ^0.19.0
  
  # İkonlar
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "assets/app_icon.png"
  adaptive_icon_foreground: "assets/transparent.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
